<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      @font-face{
        font-family:'OrbitronEmbed';
        font-weight:900;
        font-style:normal;
        src:url(data:font/woff2;base64,) format('woff2');
      }
      .h{font-family:'OrbitronEmbed','Arial Black',sans-serif;font-weight:900;}
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d18"/><stop offset="0.5" stop-color="#0f1424"/><stop offset="1" stop-color="#0a0d18"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#62a6db" stop-opacity="0.55"/><stop offset="1" stop-color="#62a6db" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowDeep" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#264fa0" stop-opacity="0.7"/><stop offset="1" stop-color="#264fa0" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowOrange" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#e3703b" stop-opacity="0.35"/><stop offset="1" stop-color="#e3703b" stop-opacity="0"/></radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75"><stop offset="0.45" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#05060a" stop-opacity="0.85"/></radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/></pattern>
    <radialGradient id="gridMask" cx="0.5" cy="0.5" r="0.62"><stop offset="0.3" stop-color="#fff" stop-opacity="1"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>
    <mask id="gridFade"><rect width="1600" height="900" fill="url(#gridMask)"/></mask>
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#62a6db" flood-opacity="0.45"/></filter>
    <filter id="playGlow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#e3703b" flood-opacity="0.55"/></filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#62a6db" stop-opacity="0"/><stop offset="0.5" stop-color="#62a6db"/><stop offset="1" stop-color="#62a6db" stop-opacity="0"/></linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="330" cy="240" r="300" fill="url(#glowBlue)"/>
  <circle cx="1280" cy="760" r="360" fill="url(#glowDeep)"/>
  <circle cx="800" cy="470" r="260" fill="url(#glowOrange)"/>
  <rect width="1600" height="900" fill="url(#grid)" mask="url(#gridFade)"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>

  <g text-anchor="middle">
    <line x1="628" y1="252" x2="676" y2="252" stroke="#62a6db" stroke-width="2"/>
    <text class="h" x="800" y="259" fill="#b3e0f6" font-size="22" letter-spacing="9">THE WALKTHROUGH</text>
    <line x1="924" y1="252" x2="972" y2="252" stroke="#62a6db" stroke-width="2"/>
  </g>

  <g filter="url(#playGlow)">
    <circle cx="800" cy="380" r="64" fill="#0a0d18" fill-opacity="0.55" stroke="#e3703b" stroke-width="2.5"/>
    <polygon points="782,350 826,380 782,410" fill="#e3703b"/>
  </g>

  <g text-anchor="middle" filter="url(#textGlow)">
    <text class="h" x="800" y="600" fill="#f5f7ff" font-size="86" letter-spacing="3">HERE'S</text>
    <text class="h" x="800" y="700" fill="#62a6db" font-size="118" letter-spacing="2">HOW IT WORKS</text>
  </g>

  <rect x="660" y="742" width="280" height="3" rx="1.5" fill="url(#accent)"/>

  <g stroke="#62a6db" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M60 60 H110 M60 60 V110"/><path d="M1540 60 H1490 M1540 60 V110"/>
    <path d="M60 840 H110 M60 840 V790"/><path d="M1540 840 H1490 M1540 840 V790"/>
  </g>
</svg>
